name: Daily Tribune Generation

on:
  schedule:
    # Sprint 6 Phase 1 (2026-05-10): cron 04:17 JST 前倒しでも GHA schedule の
    # 本質的遅延 2-3 時間で 7-9 時着が継続（5/7-5/9 観察）。神山さん起床 6:30 まで
    # に届くため 02:37 JST にさらに前倒し。中途半端な分数（37）で混雑回避を継続。
    # 期待効果: 02:37 起動 + 35-45 分ラン + 2-3 時間遅延 → 06:00 前後着。
    - cron: '37 17 * * *'  # 17:37 UTC = 02:37 JST
  workflow_dispatch: {}

jobs:
  # ===========================================================================
  # morning_paper: 紙面生成 cron（必達）
  # ===========================================================================
  #
  # C86 (Sprint 10, 2026-06-15): 旧 job 名 ``build`` をリネーム。役割は不変。
  # TRIBUNE_STAGE2_MODE=legacy を明示し、90 分 timeout 内で確実に完走させる。
  # shadow / layered モードは別 job (shadow_evaluation) に分離し、本 job は
  # 紙面配信を最優先する。shadow_evaluation の成否は本 job に影響しない
  # （並列実行、needs 関係なし）。
  morning_paper:
    runs-on: ubuntu-latest
    # Sprint 5 ポストモーメント (2026-05-05): ラン #3 で 30:11 かかり 30 分 timeout
    # で強制 cancel。当日のばらつき（RSS timeout / LLM 混雑時間帯 / runner 性能差）
    # を考慮し 60 分に拡張、確実性を優先。GitHub Actions 無料枠（月 2000 分、
    # private repo）に対し、60 分 × 30 日 = 1800 分は十分余裕内。
    # Sprint 6 で LLM 並列化による短縮を検討、短縮できれば timeout を再調整。
    #
    # Sprint 8 (2026-05-25): 5/25 ラン (26369635553) が 60 分 4 秒で cancel。
    # Cocolomi 候補枯渇 + RSS 障害複数で Page II の broad fallback ループが
    # 30 分超に肥大化、Page V miibo 開始直後で timeout。安全側で 60 → 90 分
    # に拡張。Page II の構造的肥大は副次対策として Sprint 8 で検討。
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compute target date (JST)
        id: date
        run: echo "DATE=$(TZ='Asia/Tokyo' date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Generate Tribune
        # Phase 3 (Sprint 8, 2026-05-23 切替): regen_front_page_v3 を呼ぶ。
        # v3 は内部で v2.main を delegate 実行（全 6 面従来通り archive 書込）後、
        # data/monthly_pivotal.json から当該週を引き当て、page-one のみ v3 案 C
        # 統合型に surgical swap する。月次選定未投入週・v3 例外時は v2 出力を
        # そのまま残す二段 fallback（regen_front_page_v3.py 冒頭の docstring 参照）。
        #
        # C85 / C86: TRIBUNE_STAGE2_MODE=legacy 固定。shadow は別 job
        # (shadow_evaluation) に分離した（6/15 cron で全 caller shadow が
        # 90 分 timeout 強制 cancel された経験）。
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MIIBO_API_KEY: ${{ secrets.MIIBO_API_KEY }}
          MIIBO_AGENT_ID: ${{ secrets.MIIBO_AGENT_ID }}
          TRIBUNE_STAGE2_MODE: legacy
        run: |
          python -m scripts.regen_front_page_v3 --date "${{ steps.date.outputs.DATE }}"

      - name: Upload audit logs as artifact
        # 神山さんが gh run download で取得 → 採用構造の確認用。
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-logs-${{ steps.date.outputs.DATE }}
          path: |
            logs/scores_*.json
            logs/llm_usage_*.json
            logs/page2_scores_*.json
            logs/page3_selection_*.json
          retention-days: 90

      - name: Refresh index.html with today's archive
        run: |
          cp "archive/${{ steps.date.outputs.DATE }}.html" index.html

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "archive/${{ steps.date.outputs.DATE }}.html" index.html
          git add logs/concept_history.json logs/cooking_history.json
          git add logs/displayed_urls_*.json logs/market_history.json
          git add logs/page4_rotation.json logs/page5_history.json
          # Phase 3 (2026-05-23): page1_v3 の週単位 essay キャッシュ。
          # 翌日ランで「過去日論考」を context として参照するため永続化必須。
          # 当該日が v3 適用外（v2 fallback）なら file 不在のままで no-op。
          git add logs/page1_v3_history.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(archive): ${{ steps.date.outputs.DATE }} 朝刊（自動生成）"
            # ラン中に main が進んでいた場合に push reject されないよう rebase。
            # archive/ や logs/ は workflow 専有なので conflict は理論的にあり得ない。
            git pull --rebase origin main
            git push
          fi

  # ===========================================================================
  # shadow_evaluation: layered モード shadow 観察 job（並列、紙面に影響なし）
  # ===========================================================================
  #
  # C86 (Sprint 10, 2026-06-15): morning_paper と並列実行（``needs:`` なし）し、
  # ``TRIBUNE_STAGE2_MODE=shadow_page1_only`` で **page1_master の master batch
  # のみ shadow 評価**。stage2 全体コストの 69% を占める master batch だけ
  # 観察すれば、overlap_ratio / cost 効果は捕捉できる（Phase B Step 1 コスト
  # 分析）。
  #
  # 失敗しても紙面に影響しないよう ``continue-on-error: true`` で隔離。
  # cron スケジュール起動のみ対象（``if: github.event_name == 'schedule'``）、
  # workflow_dispatch では走らせない（手動 dry-run は別途実行する設計）。
  #
  # timeout は 150 分（page1_master のみで stage2 ~62 分 × 2 ≒ 124 分 +
  # その他オーバーヘッド ~20 分）。
  #
  # ローカル / 紙面 commit はしない（archive HTML / logs / index.html を
  # commit しない）。artifact ``shadow-logs-YYYY-MM-DD`` のみ生成して
  # 神山さん artifact レビュー用とする。
  shadow_evaluation:
    if: ${{ github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: 150
    continue-on-error: true
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compute target date (JST)
        id: date
        run: echo "DATE=$(TZ='Asia/Tokyo' date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Generate Tribune (shadow_page1_only)
        # C86: page1_master の master batch のみ shadow 評価。
        # 他 caller (page3 / page4 / page5 / page6 / page2) は legacy 経路で
        # 実行され、shadow 時間は紙面 cron + (master batch 1 回追加) 程度に
        # 抑えられる。
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MIIBO_API_KEY: ${{ secrets.MIIBO_API_KEY }}
          MIIBO_AGENT_ID: ${{ secrets.MIIBO_AGENT_ID }}
          TRIBUNE_STAGE2_MODE: shadow_page1_only
        run: |
          python -m scripts.regen_front_page_v3 --date "${{ steps.date.outputs.DATE }}"

      - name: Upload shadow logs as artifact
        # 神山さん artifact レビュー: layered vs legacy の採用パターン / cost 比較。
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shadow-logs-${{ steps.date.outputs.DATE }}
          path: |
            logs/stage2_shadow_*.json
            logs/scores_*.json
            logs/llm_usage_*.json
          retention-days: 90
