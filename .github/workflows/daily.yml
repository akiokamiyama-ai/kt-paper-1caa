name: Daily Tribune Generation

on:
  schedule:
    # Sprint 6 Phase 1 (2026-05-10): cron 04:17 JST 前倒しでも GHA schedule の
    # 本質的遅延 2-3 時間で 7-9 時着が継続（5/7-5/9 観察）。神山さん起床 6:30 まで
    # に届くため 02:37 JST にさらに前倒し。中途半端な分数（37）で混雑回避を継続。
    # 期待効果: 02:37 起動 + 35-45 分ラン + 2-3 時間遅延 → 06:00 前後着。
    - cron: '37 17 * * *'  # 17:37 UTC = 02:37 JST
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    # Sprint 5 ポストモーメント (2026-05-05): ラン #3 で 30:11 かかり 30 分 timeout
    # で強制 cancel。当日のばらつき（RSS timeout / LLM 混雑時間帯 / runner 性能差）
    # を考慮し 60 分に拡張、確実性を優先。GitHub Actions 無料枠（月 2000 分、
    # private repo）に対し、60 分 × 30 日 = 1800 分は十分余裕内。
    # Sprint 6 で LLM 並列化による短縮を検討、短縮できれば timeout を再調整。
    #
    # Sprint 8 (2026-05-25): 5/25 ラン (26369635553) が 60 分 4 秒で cancel。
    # Cocolomi 候補枯渇 + RSS 障害複数で Page II の broad fallback ループが
    # 30 分超に肥大化、Page V miibo 開始直後で timeout。安全側で 60 → 90 分
    # に拡張。Page II の構造的肥大は副次対策として Sprint 8 で検討。
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compute target date (JST)
        id: date
        run: echo "DATE=$(TZ='Asia/Tokyo' date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Generate Tribune
        # Phase 3 (Sprint 8, 2026-05-23 切替): regen_front_page_v3 を呼ぶ。
        # v3 は内部で v2.main を delegate 実行（全 6 面従来通り archive 書込）後、
        # data/monthly_pivotal.json から当該週を引き当て、page-one のみ v3 案 C
        # 統合型に surgical swap する。月次選定未投入週・v3 例外時は v2 出力を
        # そのまま残す二段 fallback（regen_front_page_v3.py 冒頭の docstring 参照）。
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MIIBO_API_KEY: ${{ secrets.MIIBO_API_KEY }}
          MIIBO_AGENT_ID: ${{ secrets.MIIBO_AGENT_ID }}
        run: |
          python -m scripts.regen_front_page_v3 --date "${{ steps.date.outputs.DATE }}"

      - name: Upload audit logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-logs-${{ steps.date.outputs.DATE }}
          path: |
            logs/scores_*.json
            logs/llm_usage_*.json
            logs/page2_scores_*.json
            logs/page3_selection_*.json
          retention-days: 90

      - name: Refresh index.html with today's archive
        run: |
          cp "archive/${{ steps.date.outputs.DATE }}.html" index.html

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "archive/${{ steps.date.outputs.DATE }}.html" index.html
          git add logs/concept_history.json logs/cooking_history.json
          git add logs/displayed_urls_*.json logs/market_history.json
          git add logs/page4_rotation.json logs/page5_history.json
          # Phase 3 (2026-05-23): page1_v3 の週単位 essay キャッシュ。
          # 翌日ランで「過去日論考」を context として参照するため永続化必須。
          # 当該日が v3 適用外（v2 fallback）なら file 不在のままで no-op。
          git add logs/page1_v3_history.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(archive): ${{ steps.date.outputs.DATE }} 朝刊（自動生成）"
            # ラン中に main が進んでいた場合に push reject されないよう rebase。
            # archive/ や logs/ は workflow 専有なので conflict は理論的にあり得ない。
            git pull --rebase origin main
            git push
          fi
