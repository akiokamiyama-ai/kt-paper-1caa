  difficulty: 3

- id: piaget
  name_ja: ピアジェ
  name_en: Piaget
  domain: 発達心理学
  thinkers: [ジャン・ピアジェ]
  seed: |
    子どもの認知発達を 4 段階で記述したスイスの発達心理学者。
