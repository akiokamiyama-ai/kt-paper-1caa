    共感・受容・自己一致を治療関係の三条件とした。
  related: [empathic_understanding, servant_leadership, dialogical_self]
  difficulty: 1

- id: dialogical_self
  name_ja: 対話的自己
  name_en: Dialogical Self
  domain: 対話心理学
  thinkers: [ヒューバート・ハーマンス]
  seed: |
    自己は単一の中心を持つ実体ではなく、複数の声（I-positions）が
    対話する内的多元体だとする心理学的モデル。
    心理療法と組織論を架橋する。
  related: [intersubjectivity, i_thou, anatman]
  difficulty: 2

- id: communicative_competence
  name_ja: コミュニケーション能力
  name_en: Communicative Competence
  domain: 社会言語学
  thinkers: [デル・ハイムズ]
  seed: |
    文法的正しさを超え、状況・関係・目的に応じて適切に
    言語を使う能力。ハイムズがチョムスキーの言語能力概念を
    社会的次元に拡張、応用言語学・教育学の基礎となる。
  related: [language_game, multimodal_communication, linguistic_relativity]
  difficulty: 2

- id: sorge
  name_ja: 配慮（ゾルゲ）
  name_en: Sorge / Care
  domain: 現象学・実存哲学
  thinkers: [ハイデガー]
  seed: |
    『存在と時間』でハイデガーが現存在の根本構造として提示した
    『気遣い』。世界・道具・他者・自己への配慮として、
    人間は単なる主体ではなく関係の網目に置かれている。
  related: [being_in_the_world, responsibility_for_other, phenomenology]
  difficulty: 3

- id: responsibility_for_other
  name_ja: 他者への応答可能性
  name_en: Responsibility for the Other
  domain: 倫理学・現象学
  thinkers: [エマニュエル・レヴィナス]
  seed: |
    他者の顔の前で、応答せずにいられないという無限の倫理的
    呼びかけ。レヴィナスは存在論を超えて『他者への応答可能性』
    を第一哲学とし、暴力なき関係の可能性を問うた。
  related: [i_thou, intersubjectivity, sorge]
  difficulty: 3

- id: empathic_understanding
  name_ja: 共感的理解
  name_en: Empathic Understanding
  domain: 人間性心理学
  thinkers: [カール・ロジャース]
  seed: |
    相手の内的世界を、あたかも自分のものであるかのように
    感じ取る能力。ロジャースが人間性心理学の中核に置き、
    対話と治療の前提条件として位置づけた『as if』性。
  related: [active_listening, theory_of_mind, dialogical_self]
  difficulty: 1

- id: silence_in_dialogue
  name_ja: 沈黙の意味
  name_en: Meaning of Silence
  domain: 対話論
  thinkers: [ミハイル・バフチン]
  seed: |
    沈黙は対話の欠如ではなく、応答の準備・抵抗・意味の
    生成の場である。バフチンは発話間の隙間に多声性の宿りを
    見出し、対話論的人文学の鍵に据えた。
  related: [ma, active_listening, dialogical_self]
  difficulty: 2

- id: metacommunication
  name_ja: メタコミュニケーション
  name_en: Metacommunication
  domain: コミュニケーション論・人類学
  thinkers: [グレゴリー・ベイトソン]
  seed: |
    『これは遊びだ』のように、メッセージそのものについて
    伝えるコミュニケーション。動物の遊びと精神病理の研究から
    抽出した、関係を規定する論理階型。
  related: [language_game, communicative_competence, dual_process_theory]
  difficulty: 2

- id: hermeneutic_dialogue
  name_ja: 解釈学的対話
  name_en: Hermeneutic Dialogue
  domain: 解釈学
  thinkers: [ハンス＝ゲオルク・ガダマー]
  seed: |
    ガダマー解釈学が示す、テクスト・他者との『地平の融合』
    としての対話。問いと答えの往復が解釈を深化させる構造、
    傾聴と理解の哲学的基盤。
  related: [intersubjectivity, lifeworld, active_listening]
  difficulty: 3

# ============================================================
# Sprint 8 Group C: 人名 concept 38 件追加（2026-05-19）
# 古代〜現代を横断する思想家を 38 人、独立 concept として登録。
# 人名と概念を別エントリにすることで、related ネットワークを
# 「思想家 ↔ 代表概念」の両方向で構築可能にする。
# ============================================================

# --- 古代・中世 ---

- id: socrates
  name_ja: ソクラテス
  name_en: Socrates
  domain: 古代哲学
  thinkers: [ソクラテス]
  seed: |
    書物を残さなかったが、無知の知と問答法（エレンコス）で
    西洋哲学の出発点となったアテネの哲学者。
    弟子プラトンを通じて、対話と倫理的探求の典型を遺した。
  related: [plato, hermeneutic_dialogue, dialogical_self]
  difficulty: 1

- id: plato
  name_ja: プラトン
  name_en: Plato
  domain: 古代哲学
  thinkers: [プラトン]
  seed: |
    ソクラテスの弟子、対話篇『国家』『饗宴』『ティマイオス』を
    遺したアカデメイアの開祖。イデア論、想起説、哲人王思想で
    西洋哲学全体に影を落とした。
  related: [socrates, aristotle, apophatic_theology]
  difficulty: 2

- id: aristotle
  name_ja: アリストテレス
  name_en: Aristotle
  domain: 古代哲学
  thinkers: [アリストテレス]
  seed: |
    論理学・形而上学・倫理学・政治学・詩学・自然学を体系化した
    古代哲学の巨人。プラトンの弟子だが現実重視に転換、
    中世以降の西欧学問の基本枠組みを与え続けた。
  related: [plato, socrates, ontology]
  difficulty: 2

- id: augustine
  name_ja: アウグスティヌス
  name_en: Augustine
  domain: 神学・哲学
  thinkers: [アウグスティヌス]
  seed: |
    『告白』『神の国』を著した教父神学の最大の存在。
    意志・時間・記憶・恩寵という主題で、後の西欧思想史の
    核を構成、近代主体観の遠源ともなる。
  related: [aquinas, apophatic_theology, plato]
  difficulty: 2

- id: aquinas
  name_ja: トマス・アクィナス
  name_en: Aquinas
  domain: 神学・哲学
  thinkers: [トマス・アクィナス]
  seed: |
    『神学大全』で信仰と理性の総合を試みた中世スコラ哲学の巨頭。
    アリストテレス哲学をキリスト教神学に組み込み、
    西欧の知的伝統の屋根組みを作った。
  related: [aristotle, augustine, apophatic_theology]
  difficulty: 3

# --- 近代哲学 ---

- id: descartes
  name_ja: デカルト
  name_en: Descartes
  domain: 近代哲学
  thinkers: [デカルト]
  seed: |
    『方法序説』『省察』で近代哲学を開始したフランスの数学者・
    哲学者。方法的懐疑から『我思うゆえに我あり』を導き、
    心身二元論で近代の主体観の枠組みを与えた。
  related: [phenomenology, kant, spinoza]
  difficulty: 2

- id: spinoza
  name_ja: スピノザ
  name_en: Spinoza
  domain: 近代哲学
  thinkers: [スピノザ]
  seed: |
    『エチカ』を幾何学的方法で書いたオランダのユダヤ系哲学者。
    神＝自然の汎神論的一元論、感情の地理学で人間の自由を再定義、
    現代の情動論・複雑系まで響き続ける。
  related: [conatus, deleuze, descartes]
  difficulty: 3

- id: kant
  name_ja: カント
  name_en: Kant
  domain: 認識論・倫理学
  thinkers: [カント]
  seed: |
    『純粋理性批判』で認識論を一変させた近代哲学の頂点。
    コペルニクス的転回により、対象が認識に従うのではなく
    認識が対象を構成すると示した。物自体・道徳法則を遺す。
  related: [phenomenology, falsifiability, nietzsche]
  difficulty: 3

- id: hegel
  name_ja: ヘーゲル
  name_en: Hegel
  domain: ドイツ観念論
  thinkers: [ヘーゲル]
  seed: |
    『精神現象学』『大論理学』でドイツ観念論を頂点に導いた哲学者。
    弁証法・絶対精神・主奴の弁証法など、その後 200 年の哲学と
    社会理論を覆う巨大な体系を構築した。
  related: [marx, kant, nietzsche]
  difficulty: 3

- id: marx
  name_ja: マルクス
  name_en: Marx
  domain: 社会哲学・経済学
  thinkers: [マルクス]
  seed: |
    『資本論』『経済学・哲学草稿』で資本主義を解剖し、
    20 世紀政治史を動かした哲学者・経済学者。疎外論・物象化・
    上部下部構造で、社会の物質的基礎を分析する方法を遺した。
  related: [hegel, foucault, bourdieu]
  difficulty: 2

# --- 現代思想（西洋） ---

- id: nietzsche
  name_ja: ニーチェ
  name_en: Nietzsche
  domain: 現代思想
  thinkers: [ニーチェ]
  seed: |
    『ツァラトゥストラ』『道徳の系譜』で西洋形而上学の根本前提を
    破壊した思想家。神の死・超人・永劫回帰・力への意志という
    劇薬的概念で、現代思想の地下水脈となった。
  related: [foucault, derrida, deleuze]
  difficulty: 3

- id: husserl
  name_ja: フッサール
  name_en: Husserl
  domain: 現象学
  thinkers: [フッサール]
  seed: |
    現象学の創始者。『論理学研究』『イデーン』で意識の志向性を
    分析、判断中止により事象そのものへ立ち戻る哲学的方法を
    確立。後継の現象学運動を生み出した。
  related: [phenomenology, intentionality, lifeworld]
  difficulty: 3

- id: heidegger
  name_ja: ハイデガー
  name_en: Heidegger
  domain: 現象学・実存哲学
  thinkers: [ハイデガー]
  seed: |
    『存在と時間』で存在論を根底から問い直した 20 世紀最大級の
    哲学者。現存在・世界内存在・気遣いといった核心概念で、
    人間と世界の根源的関係を描き直した。
  related: [being_in_the_world, sorge, phenomenology, husserl]
  difficulty: 3

- id: merleau_ponty
  name_ja: メルロ＝ポンティ
  name_en: Merleau-Ponty
  domain: 現象学
  thinkers: [メルロ＝ポンティ]
  seed: |
    『知覚の現象学』で身体を哲学の中心に据えたフランス現象学者。
    意識ではなく身体こそが世界と関わる根源、と示し、
    認知科学のエンボディメント論を半世紀先取りした。
  related: [embodiment, embodied_cognition, husserl, phenomenology]
  difficulty: 3

- id: wittgenstein
  name_ja: ウィトゲンシュタイン
  name_en: Wittgenstein
  domain: 言語哲学
  thinkers: [ウィトゲンシュタイン]
  seed: |
    前期『論理哲学論考』で語りえぬものを示し、後期『哲学探究』
    で言語ゲーム論に転じた。20 世紀分析哲学の方向を二度
    規定した稀有な哲学者。
  related: [language_game, linguistic_relativity, quine]
  difficulty: 3

- id: quine
  name_ja: クワイン
  name_en: Quine
  domain: 分析哲学
  thinkers: [クワイン]
  seed: |
    『経験主義の二つのドグマ』『ことばと対象』で分析哲学の
    前提を揺るがしたアメリカの論理学者。経験的全体論・
    翻訳の不確定性で、意味と真理の伝統的観念を解体した。
  related: [wittgenstein, language_game, ontology]
  difficulty: 3

- id: levinas
  name_ja: レヴィナス
  name_en: Levinas
  domain: 倫理学・現象学
  thinkers: [エマニュエル・レヴィナス]
  seed: |
    ホロコースト体験を経て、存在論を超える倫理を第一哲学として
    打ち立てたリトアニア出身のユダヤ系哲学者。『全体性と無限』
    で他者の顔の倫理的呼びかけを思考した。
  related: [responsibility_for_other, i_thou, intersubjectivity]
  difficulty: 3

- id: gadamer
  name_ja: ガダマー
  name_en: Gadamer
  domain: 解釈学
  thinkers: [ハンス＝ゲオルク・ガダマー]
  seed: |
    ハイデガーの弟子として『真理と方法』で哲学的解釈学を体系化。
    理解は地平の融合として起こる、伝統・偏見は否定的ではなく
    理解の前提条件であると示した。
  related: [hermeneutic_dialogue, heidegger, lifeworld]
  difficulty: 3

- id: arendt
  name_ja: アーレント
  name_en: Arendt
  domain: 政治哲学
  thinkers: [ハンナ・アーレント]
  seed: |
    『人間の条件』『全体主義の起源』で 20 世紀の政治哲学を
    再定義したユダヤ系思想家。労働・仕事・活動の区別、
    悪の凡庸さといった概念で、公共と私的領域の意味を問い直した。
  related: [responsibility_for_other, foucault, panopticon]
  difficulty: 2

- id: foucault
  name_ja: フーコー
  name_en: Foucault
  domain: 現代思想
  thinkers: [ミシェル・フーコー]
  seed: |
    『言葉と物』『監獄の誕生』『性の歴史』で知と権力の絡み合いを
    系譜学的に解剖した現代思想家。狂気・規律・統治性の歴史を
    通じて、近代主体の構築過程を露わにした。
  related: [panopticon, nietzsche, latour]
  difficulty: 3

- id: derrida
  name_ja: デリダ
  name_en: Derrida
  domain: 現代思想
  thinkers: [ジャック・デリダ]
  seed: |
    『グラマトロジーについて』『散種』で脱構築を打ち立てた
    フランス系アルジェリア出身の哲学者。差延・痕跡・代補の
    概念で西洋形而上学の二項対立を内側から崩した。
  related: [nietzsche, foucault, deleuze]
  difficulty: 3

- id: deleuze
  name_ja: ドゥルーズ
  name_en: Deleuze
  domain: 現代思想
  thinkers: [ジル・ドゥルーズ]
  seed: |
    『差異と反復』『アンチ・オイディプス』（ガタリと共著）で
    20 世紀後半哲学を一変させたフランス哲学者。差異・生成・
    リゾームで、同一性と表象の哲学を超える思考を展開。
  related: [rhizome, spinoza, derrida]
  difficulty: 3

- id: rawls
  name_ja: ロールズ
  name_en: Rawls
  domain: 政治哲学
  thinkers: [ジョン・ロールズ]
  seed: |
    『正義論』で現代政治哲学を再生させたハーバードの哲学者。
    無知のヴェールの背後で選ばれる正義の原理という思考実験で、
    自由と平等の両立を理論化した。
  related: [arendt, marx, human_capital]
  difficulty: 2

# --- 認知・人類学・社会 ---

- id: levi_strauss
  name_ja: レヴィ＝ストロース
  name_en: Lévi-Strauss
