  related: [vygotsky, metacognition, theory_of_mind]
  difficulty: 2

- id: vygotsky
  name_ja: ヴィゴツキー
  name_en: Vygotsky
  domain: 発達心理学
  thinkers: [レフ・ヴィゴツキー]
  seed: |
    『思考と言語』『高次精神機能の発達史』で社会文化的発達
    理論を打ち立てたロシアの心理学者。発達の最近接領域・
    足場かけ概念で教育心理学の基盤を作った。
  related: [piaget, communicative_competence, knowledge_transfer]
  difficulty: 2

# --- 経営学 ---

- id: drucker
  name_ja: ドラッカー
  name_en: Drucker
  domain: 経営学
  thinkers: [ピーター・ドラッカー]
  seed: |
    『マネジメント』『プロフェッショナルの条件』など 30 余の
