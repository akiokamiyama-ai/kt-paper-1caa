    文化の三層モデル、キャリア・アンカーで組織と個人を掘り下げた。
  related: [career_anchor, organizational_learning, psychological_safety]
  difficulty: 1

# --- 日本思想 ---

- id: kukai
  name_ja: 空海
  name_en: Kūkai
  domain: 日本思想・仏教
