  difficulty: 3

- id: bourdieu
  name_ja: ブルデュー
  name_en: Bourdieu
  domain: 社会学
  thinkers: [ピエール・ブルデュー]
  seed: |
    『ディスタンクシオン』『実践感覚』でフランス社会学を主導した
    思想家。ハビトゥス・場・文化資本の三つ組で、構造と主体・
